services:
  - type: web
    name: n8n
    runtime: docker
    dockerContext: .
    dockerfilePath: n8n/Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: N8N_PORT
        value: "5678"
      - key: PORT
        value: "5678"
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        value: "5432"
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password

      # FIX: Correctly import the entire environment group as a string string
      - fromGroup: n8n-configuration

      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: EXECUTIONS_DATA_PRUNE
        value: "true"
      - key: EXECUTIONS_DATA_MAX_AGE
        value: "168"
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - key: N8N_PROTOCOL
        value: https
        
      - key: WEBHOOK_URL
        fromService:
          type: web
          name: n8n
          property: host

databases:
  - name: n8n-db
    plan: free
    databaseName: n8n

envVarGroups:
  - name: n8n-configuration
    envVars:
      # Renamed key here so it seamlessly maps directly to your container
      - key: GENERIC_TIMEZONE
        displayName: "Application Timezone"
        description: "Set your local timezone (e.g., Asia/Kolkata, America/New_York)"
        value: "Asia/Kolkata"
