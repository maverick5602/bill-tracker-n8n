services:
  - type: web
    name: n8n
    runtime: docker
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    envVars:
      - key: N8N_HOST
        fromService:
          type: web
          name: n8n
          property: host
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        fromService:
          type: web
          name: n8n
          property: hostport
      - key: GENERIC_TIMEZONE
        value: Asia/Kolkata
      - key: N8N_RUNNERS_ENABLED
        value: "true"
